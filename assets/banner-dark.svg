  <!-- ASCII donut -->
  <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="22" fill="url(#ph)" filter="url(#glow)" letter-spacing="2.5">
    <text x="70" y="95"  xml:space="preserve">         .~=#@@@#=~.</text>
    <text x="70" y="121" xml:space="preserve">      :=#$$$$$$$$$#=:</text>
    <text x="70" y="147" xml:space="preserve">    ~#$$;;;;;;;;;;;$$#~</text>
    <text x="70" y="173" xml:space="preserve">   =$$;:~-,,,,,,-~:;$$=</text>
    <text x="70" y="199" xml:space="preserve">  =$#;~-.        .-~;#$=</text>
    <text x="70" y="225" xml:space="preserve">  #$;:-.          .-:;$#</text>
    <text x="70" y="251" xml:space="preserve">  =$#;~-.        .-~;#$=</text>
    <text x="70" y="277" xml:space="preserve">   =$$;:~-,,,,,,-~:;$$=</text>
    <text x="70" y="303" xml:space="preserve">    ~#$$;;;;;;;;;;;$$#~</text>
    <text x="70" y="329" xml:space="preserve">      :=#$$$$$$$$$#=:</text>
    <text x="70" y="355" xml:space="preserve">         .~=#@@@#=~.</text>
  </g>

  <!-- wordmark -->
  <text x="550" y="200" font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="74" font-weight="700" fill="url(#ph)" filter="url(#glow)" letter-spacing="2">ASCII ARCADE</text>
  <text x="563" y="255" font-family="system-ui,'Helvetica Neue',Arial,sans-serif" font-size="27" fill="#9fe6b4">Live ASCII scenes as your macOS desktop wallpaper.</text>

  <!-- scene chips -->
  <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="22" font-weight="700">
    <rect x="563" y="290" width="120" height="44" rx="8" fill="none" stroke="#33ff66" stroke-width="2"/>
    <text x="585" y="319" fill="#33ff66">donut</text>
    <rect x="699" y="290" width="120" height="44" rx="8" fill="none" stroke="#33ff66" stroke-width="2"/>
    <text x="723" y="319" fill="#33ff66">helix</text>
    <rect x="835" y="290" width="120" height="44" rx="8" fill="none" stroke="#ff5a4d" stroke-width="2"/>
    <text x="861" y="319" fill="#ff7a6d">doom</text>
  </g>
</svg>
