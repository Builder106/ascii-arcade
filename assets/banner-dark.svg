    <rect x="0" y="128" width="1200" height="2"/>
    <rect x="0" y="136" width="1200" height="2"/>
    <rect x="0" y="144" width="1200" height="2"/>
    <rect x="0" y="152" width="1200" height="2"/>
    <rect x="0" y="160" width="1200" height="2"/>
    <rect x="0" y="168" width="1200" height="2"/>
    <rect x="0" y="176" width="1200" height="2"/>
    <rect x="0" y="184" width="1200" height="2"/>
    <rect x="0" y="192" width="1200" height="2"/>
    <rect x="0" y="200" width="1200" height="2"/>
    <rect x="0" y="208" width="1200" height="2"/>
    <rect x="0" y="216" width="1200" height="2"/>
    <rect x="0" y="224" width="1200" height="2"/>
    <rect x="0" y="232" width="1200" height="2"/>
    <rect x="0" y="240" width="1200" height="2"/>
    <rect x="0" y="248" width="1200" height="2"/>
    <rect x="0" y="256" width="1200" height="2"/>
