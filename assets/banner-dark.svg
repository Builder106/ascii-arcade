    <rect x="0" y="320" width="1200" height="2"/>
    <rect x="0" y="328" width="1200" height="2"/>
    <rect x="0" y="336" width="1200" height="2"/>
    <rect x="0" y="344" width="1200" height="2"/>
    <rect x="0" y="352" width="1200" height="2"/>
    <rect x="0" y="360" width="1200" height="2"/>
