<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="ASCII Arcade — live ASCII wallpapers for macOS">
  <defs>
    <radialGradient id="bg" cx="32%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#0f1710"/>
      <stop offset="100%" stop-color="#070a07"/>
    </radialGradient>
    <linearGradient id="ph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8dffb0"/>
      <stop offset="100%" stop-color="#2ff05f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- scanlines -->
  <g opacity="0.06" fill="#33ff66">
    <rect x="0" y="0" width="1200" height="2"/>
    <rect x="0" y="8" width="1200" height="2"/>
    <rect x="0" y="16" width="1200" height="2"/>
    <rect x="0" y="24" width="1200" height="2"/>
    <rect x="0" y="32" width="1200" height="2"/>
    <rect x="0" y="40" width="1200" height="2"/>
