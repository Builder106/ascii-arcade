<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="ASCII Arcade — live ASCII wallpapers for macOS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#ececed"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2b2e"/>
      <stop offset="100%" stop-color="#161618"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>

  <!-- scanlines -->
  <g opacity="0.05" fill="#1c1c1e">
    <rect x="0" y="0" width="1200" height="2"/>
    <rect x="0" y="10" width="1200" height="2"/>
    <rect x="0" y="20" width="1200" height="2"/>
    <rect x="0" y="30" width="1200" height="2"/>
    <rect x="0" y="40" width="1200" height="2"/>
    <rect x="0" y="50" width="1200" height="2"/>
    <rect x="0" y="60" width="1200" height="2"/>
    <rect x="0" y="70" width="1200" height="2"/>
    <rect x="0" y="80" width="1200" height="2"/>
    <rect x="0" y="90" width="1200" height="2"/>
    <rect x="0" y="100" width="1200" height="2"/>
    <rect x="0" y="110" width="1200" height="2"/>
    <rect x="0" y="120" width="1200" height="2"/>
    <rect x="0" y="130" width="1200" height="2"/>
    <rect x="0" y="140" width="1200" height="2"/>
    <rect x="0" y="150" width="1200" height="2"/>
    <rect x="0" y="160" width="1200" height="2"/>
    <rect x="0" y="170" width="1200" height="2"/>
    <rect x="0" y="180" width="1200" height="2"/>
    <rect x="0" y="190" width="1200" height="2"/>
    <rect x="0" y="200" width="1200" height="2"/>
    <rect x="0" y="210" width="1200" height="2"/>
    <rect x="0" y="220" width="1200" height="2"/>
    <rect x="0" y="230" width="1200" height="2"/>
    <rect x="0" y="240" width="1200" height="2"/>
    <rect x="0" y="250" width="1200" height="2"/>
    <rect x="0" y="260" width="1200" height="2"/>
    <rect x="0" y="270" width="1200" height="2"/>
    <rect x="0" y="280" width="1200" height="2"/>
    <rect x="0" y="290" width="1200" height="2"/>
    <rect x="0" y="300" width="1200" height="2"/>
    <rect x="0" y="310" width="1200" height="2"/>
    <rect x="0" y="320" width="1200" height="2"/>
    <rect x="0" y="330" width="1200" height="2"/>
    <rect x="0" y="340" width="1200" height="2"/>
    <rect x="0" y="350" width="1200" height="2"/>
    <rect x="0" y="360" width="1200" height="2"/>
    <rect x="0" y="370" width="1200" height="2"/>
    <rect x="0" y="380" width="1200" height="2"/>
    <rect x="0" y="390" width="1200" height="2"/>
    <rect x="0" y="400" width="1200" height="2"/>
    <rect x="0" y="410" width="1200" height="2"/>
  </g>

  <!-- ASCII donut -->
  <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="22" fill="url(#ink)" letter-spacing="2.5">
    <text x="70" y="95"  xml:space="preserve">         .~=#@@@#=~.</text>
    <text x="70" y="121" xml:space="preserve">      :=#$$$$$$$$$#=:</text>
    <text x="70" y="147" xml:space="preserve">    ~#$$;;;;;;;;;;;$$#~</text>
    <text x="70" y="173" xml:space="preserve">   =$$;:~-,,,,,,-~:;$$=</text>
    <text x="70" y="199" xml:space="preserve">  =$#;~-.        .-~;#$=</text>
    <text x="70" y="225" xml:space="preserve">  #$;:-.          .-:;$#</text>
    <text x="70" y="251" xml:space="preserve">  =$#;~-.        .-~;#$=</text>
    <text x="70" y="277" xml:space="preserve">   =$$;:~-,,,,,,-~:;$$=</text>
    <text x="70" y="303" xml:space="preserve">    ~#$$;;;;;;;;;;;$$#~</text>
    <text x="70" y="329" xml:space="preserve">      :=#$$$$$$$$$#=:</text>
    <text x="70" y="355" xml:space="preserve">         .~=#@@@#=~.</text>
  </g>

  <!-- wordmark -->
  <text x="550" y="200" font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="74" font-weight="700" fill="url(#ink)" letter-spacing="2">ASCII ARCADE</text>
  <text x="563" y="255" font-family="system-ui,'Helvetica Neue',Arial,sans-serif" font-size="27" fill="#4a4a4f">Live ASCII scenes as your macOS desktop wallpaper.</text>

  <!-- scene chips -->
  <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="22" font-weight="700">
    <rect x="563" y="290" width="120" height="44" rx="8" fill="none" stroke="#1c1c1e" stroke-width="2"/>
    <text x="585" y="319" fill="#1c1c1e">donut</text>
    <rect x="699" y="290" width="120" height="44" rx="8" fill="none" stroke="#1c1c1e" stroke-width="2"/>
    <text x="723" y="319" fill="#1c1c1e">helix</text>
    <rect x="835" y="290" width="120" height="44" rx="8" fill="none" stroke="#c43b2e" stroke-width="2"/>
    <text x="861" y="319" fill="#c43b2e">doom</text>
  </g>
</svg>
