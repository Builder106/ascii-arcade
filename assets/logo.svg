<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ASCII Arcade logo">
  <defs>
    <radialGradient id="ph" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#7dffa8"/>
      <stop offset="60%" stop-color="#33ff66"/>
      <stop offset="100%" stop-color="#16b33f"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- full-bleed brand background (rounded corners drawn by the OS for app icons) -->
  <rect width="64" height="64" rx="13" fill="#0a0e0a"/>
  <!-- faint scanlines -->
  <g opacity="0.10" fill="#33ff66">
    <rect x="0" y="14" width="64" height="1"/>
    <rect x="0" y="22" width="64" height="1"/>
    <rect x="0" y="30" width="64" height="1"/>
    <rect x="0" y="38" width="64" height="1"/>
    <rect x="0" y="46" width="64" height="1"/>
  </g>
  <!-- the donut: a glowing phosphor torus -->
  <g filter="url(#glow)">
    <ellipse cx="32" cy="30" rx="20" ry="14" fill="none" stroke="url(#ph)" stroke-width="7"/>
    <ellipse cx="32" cy="30" rx="20" ry="14" fill="none" stroke="#0a0e0a" stroke-width="0.6" opacity="0.5"/>
    <!-- specular highlight -->
    <path d="M18 22 A20 14 0 0 1 40 19" fill="none" stroke="#d8ffe6" stroke-width="2.4" stroke-linecap="round" opacity="0.85"/>
  </g>
  <!-- caret cursor, the "arcade" nod -->
  <rect x="29.5" y="50" width="5" height="6" fill="#33ff66" filter="url(#glow)"/>
</svg>
