<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ASCII Arcade — live ASCII wallpapers for macOS">
  <defs>
    <radialGradient id="bg" cx="34%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#0f1710"/>
      <stop offset="100%" stop-color="#060906"/>
    </radialGradient>
    <linearGradient id="ph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8dffb0"/>
      <stop offset="100%" stop-color="#2ff05f"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="3" height="8" patternUnits="userSpaceOnUse">
      <rect width="3" height="2" fill="#33ff66"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#scan)" opacity="0.06"/>
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#1c3a22" stroke-width="2"/>

  <!-- ASCII donut, vertically centered on the left -->
  <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="24" fill="url(#ph)" filter="url(#glow)" letter-spacing="3">
    <text x="95" y="190" xml:space="preserve">         .~=#@@@#=~.</text>
    <text x="95" y="220" xml:space="preserve">      :=#$$$$$$$$$#=:</text>
    <text x="95" y="250" xml:space="preserve">    ~#$$;;;;;;;;;;;$$#~</text>
    <text x="95" y="280" xml:space="preserve">   =$$;:~-,,,,,,-~:;$$=</text>
    <text x="95" y="310" xml:space="preserve">  =$#;~-.        .-~;#$=</text>
    <text x="95" y="340" xml:space="preserve">  #$;:-.          .-:;$#</text>
    <text x="95" y="370" xml:space="preserve">  =$#;~-.        .-~;#$=</text>
    <text x="95" y="400" xml:space="preserve">   =$$;:~-,,,,,,-~:;$$=</text>
    <text x="95" y="430" xml:space="preserve">    ~#$$;;;;;;;;;;;$$#~</text>
    <text x="95" y="460" xml:space="preserve">      :=#$$$$$$$$$#=:</text>
    <text x="95" y="490" xml:space="preserve">         .~=#@@@#=~.</text>
  </g>

  <!-- wordmark + copy -->
  <text x="585" y="285" font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="76" font-weight="700" fill="url(#ph)" filter="url(#glow)" letter-spacing="2">ASCII</text>
  <text x="585" y="368" font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="76" font-weight="700" fill="url(#ph)" filter="url(#glow)" letter-spacing="2">ARCADE</text>
  <text x="588" y="412" font-family="system-ui,'Helvetica Neue',Arial,sans-serif" font-size="26" fill="#9fe6b4">Live ASCII scenes as your macOS wallpaper.</text>

  <g font-family="'SFMono-Regular','Menlo','Consolas',monospace" font-size="22" font-weight="700">
    <rect x="588" y="442" width="116" height="44" rx="8" fill="none" stroke="#33ff66" stroke-width="2"/>
    <text x="609" y="471" fill="#33ff66">donut</text>
    <rect x="720" y="442" width="116" height="44" rx="8" fill="none" stroke="#33ff66" stroke-width="2"/>
    <text x="743" y="471" fill="#33ff66">helix</text>
    <rect x="852" y="442" width="116" height="44" rx="8" fill="none" stroke="#ff5a4d" stroke-width="2"/>
    <text x="877" y="471" fill="#ff7a6d">doom</text>
  </g>
</svg>
